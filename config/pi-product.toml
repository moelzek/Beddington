# Beddington — "real final product" profile for the Raspberry Pi (mic + speaker).
#
# This is default.toml with the on-device playback bits switched on so you can
# mimic the finished product: the mic hears a cry, the speaker plays a soothe
# sound, Beddington listens back to confirm it settled, records the outcome to
# its on-device memory, and the morning recap is narrated by the local llama.
#
# Run:  bash scripts/setup_models.sh        # one-time: pull llama3.2:1b
#       beddington --config config/pi-product.toml listen --seconds 180
# See:  PI_REAL_PRODUCT_TEST.md

[detection]
threshold = 0.40
sustained_seconds = 1.5
release_seconds = 1.0
notification_cooldown_seconds = 30.0

[notifications]
desktop = true

[sounds]
enabled = true
threshold = 0.2

[soothe]
# ON for the real product: play the chosen preset through the Pi speaker.
enabled = true
# "auto" plays a real local audio file via a compatible system player.
player = "auto"
preset = "white_noise"
# Keep soothe audio playing for at least ten minutes once triggered.
min_play_seconds = 600.0
# Keep playing for ten minutes after the last cry ends.
hold_after_stop_seconds = 600.0
# Switch sounds after five minutes of continued crying.
escalate_after_seconds = 300.0

[soothe.learn]
# Learn which sound calms this baby. Lower min_samples so the learning visibly
# kicks in during a hands-on test (raise back to ~10 for real use).
enabled = true
min_samples = 3

[soothe.quiet_check]
# Keep playback continuous; cry_started/cry_ended tracker events tell us whether
# crying is still active without pausing the sound to listen back.
enabled = false
check_interval_seconds = 15.0
listen_seconds = 4.0
required_checks = 2
pause_during_check = true
stop_on_notify = true

