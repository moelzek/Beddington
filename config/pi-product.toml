[sensors]
sample_interval_seconds = 10.0

# Hardware sensors stay off unless you have them wired. Enable as needed:
[sensors.air]
enabled = false
i2c_address = 0x76
gas = false

[sensors.motion]
enabled = false
gpio_pin = 4

[sensors.radar]
enabled = false
host = ""
port = 6053
password = ""
include_distance = true
include_target_count = true
bench_vitals = false

[assistant]
chime_enabled = true

[assistant.llm_translator]
# Understands fuzzy questions via the local llama (value still from the brain).
enabled = true

[narrator]
# Morning recap narrated by the local llama3.2:1b.
enabled = true
backend = "ollama"
model = "llama3.2:3b"
host = "http://127.0.0.1:11434"
num_predict = 140
temperature = 0.3
# Speak the recap aloud through the speaker. Needs Piper installed + a voice
# model (see PI_REAL_PRODUCT_TEST.md). Leave false if Piper isn't set up yet.
voice_enabled = false
voice_engine = "piper"
piper_binary = "~/piper/piper"
piper_model = "~/piper-voices/en_GB-vctk-medium.onnx"
piper_speaker = "19"
piper_speed = 0.85
persona_enabled = true
