[sensors]
# Optional derived room context for narration. These samples never control
# cry detection, timing, soothing, or alerts.
sample_interval_seconds = 10.0

[sensors.air]
# Pimoroni BME688 air breakout on I2C. Off by default for hardware-free runs.
enabled = false
i2c_address = 0x76
# Also read the gas/VOC channel (experimental nappy-VOC "best guess"). The gas
# heater takes a few seconds to stabilise before readings appear.
gas = false

[sensors.motion]
# HC-SR501 PIR motion on GPIO4. Off by default and treated as context only.
enabled = false
gpio_pin = 4

[sensors.radar]
# Seeed MR60BHA2 60GHz mmWave kit (XIAO ESP32C6) on WiFi, read over the ESPHome
# native API. Off by default. Only non-medical fields are used (presence, room
# brightness, distance, target count). Respiratory/heart rate are never read —
# the radar's vital signs stay bench-only, with no medical or vital-sign claims.
enabled = false
host = ""
port = 6053
password = ""
include_distance = true
include_target_count = true
# Bench/research ONLY. When true, the radar's respiratory + heart-rate values are
# captured and surfaced as raw, clearly-labelled bench data (e.g. `beddington
# radar-vitals`). They are never fed into the spoken recap, never paired with any
# reassurance, never drive detection/alerts, and are never a medical or safety
# signal. Product/clinical use of these vitals needs the Tier-3 gate + sign-off.
bench_vitals = false

[llm]
enabled = false
base_url = ""
model = ""

[assistant]
chime_enabled = true

[assistant.llm_translator]
# Local intent classifier (uses the [narrator] llama model/host). It only runs
# after the deterministic answer path misses, and can select an existing intent
# only — it never invents a value. On by default; no-ops if Ollama is absent.
enabled = true

[narrator]
# Local narrator (llama3.2:1b via Ollama). Runs only after the deterministic
# report exists. It receives derived text only and never controls detection,
# timing, or alerts. On by default; falls back to the plain digest if Ollama
# or the model is unavailable. Pull the model once with scripts/setup_models.sh.
enabled = true
backend = "ollama"
model = "llama3.2:1b"
host = "http://127.0.0.1:11434"
num_predict = 140
temperature = 0.3
voice_enabled = false
voice_engine = "piper"
piper_binary = "~/piper/piper"
piper_model = "~/piper-voices/en_GB-jenny_dioco-medium.onnx"
# Multi-speaker voices (e.g. en_GB-vctk) pick a speaker by id; empty = default.
# piper_speaker = ""
# Beddington persona: a local LLM re-voices each (benign) answer in character (a
# gentle bear in the spirit of Paddington), grounded + validated so it can never
# change a fact (see persona.py). Vitals are never restyled. Falls back to the
# plain answer if Ollama is unavailable.
persona_enabled = true
# persona_temperature = 0.4
# persona_num_predict = 80
# persona_timeout = 8.0
