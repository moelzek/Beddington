[detection]
# YAMNet scores are model scores, not calibrated medical probabilities.
threshold = 0.40
sustained_seconds = 1.5
release_seconds = 1.0
notification_cooldown_seconds = 30.0

[notifications]
desktop = true

[soothe]
# Tier 1 is explicit. Keep this off unless you want Lullaby to play the
# selected preset before notifying.
enabled = false
# "none" records the preset without playing audio. Use "auto" with sound_path
# for a real local WAV/AIFF/MP3 file on macOS or Raspberry Pi OS.
player = "none"
# Pick exactly one: white_noise, heartbeat, soothing_music, or uterine_whoosh.
preset = "white_noise"

[soothe.quiet_check]
# Quiet checks are deterministic listen-only windows during soothing. Keep this
# off until you are deliberately testing soothe verification.
enabled = false
check_interval_seconds = 120.0
listen_seconds = 5.0
required_checks = 2
pause_during_check = true
stop_on_notify = true

[soothe.presets.white_noise]
name = "white noise"
sound_path = "../assets/soothe/white_noise.wav"
wait_seconds = 1800.0
play_seconds = 1800.0

[soothe.presets.heartbeat]
name = "heartbeat-style pulses"
sound_path = "../assets/soothe/heartbeat.wav"
wait_seconds = 1800.0
play_seconds = 1800.0

[soothe.presets.soothing_music]
name = "soothing music"
sound_path = "../assets/soothe/soothing_music.wav"
wait_seconds = 1800.0
play_seconds = 1800.0

[soothe.presets.uterine_whoosh]
name = "uterine whoosh"
sound_path = "../assets/soothe/uterine_whoosh.wav"
wait_seconds = 1800.0
play_seconds = 1800.0

[llm]
enabled = false
base_url = ""
model = ""
