[detection]
# YAMNet scores are model scores, not calibrated medical probabilities.
threshold = 0.40
sustained_seconds = 1.5
release_seconds = 1.0
notification_cooldown_seconds = 30.0

[notifications]
desktop = true

[sounds]
# Record non-cry baby/room sounds the mic hears (cooing, laughter, snoring, etc.)
# as observer-only context for the night story. Off by default; the deterministic
# cry detection is unaffected.
enabled = false
threshold = 0.2

[soothe]
# Tier 1 is explicit. Keep this off unless you want Beddington to play the
# selected preset before notifying.
enabled = false
# "none" records the preset without playing audio. Use "auto" with sound_path
# for a real local WAV/AIFF/MP3 file on macOS or Raspberry Pi OS.
player = "none"
# Pick exactly one: white_noise, heartbeat, soothing_music, or uterine_whoosh.
preset = "white_noise"

[soothe.learn]
# Use on-device outcome counts to choose a preset. Off by default.
enabled = false
min_samples = 10

[soothe.quiet_check]
# Quiet checks are deterministic listen-only windows during soothing. Keep this
# off until you are deliberately testing soothe verification.
enabled = false
check_interval_seconds = 120.0
listen_seconds = 5.0
required_checks = 2
pause_during_check = true
stop_on_notify = true

[soothe.presets.white_noise]
name = "white noise"
sound_path = "../assets/soothe/white_noise.wav"
wait_seconds = 1800.0
play_seconds = 1800.0

[soothe.presets.heartbeat]
name = "heartbeat-style pulses"
sound_path = "../assets/soothe/heartbeat.wav"
wait_seconds = 1800.0
play_seconds = 1800.0

[soothe.presets.soothing_music]
name = "soothing music"
sound_path = "../assets/soothe/soothing_music.wav"
wait_seconds = 1800.0
play_seconds = 1800.0

[soothe.presets.uterine_whoosh]
name = "uterine whoosh"
sound_path = "../assets/soothe/uterine_whoosh.wav"
wait_seconds = 1800.0
play_seconds = 1800.0

[sensors]
# Optional derived room context for narration. These samples never control
# cry detection, timing, soothing, or alerts.
sample_interval_seconds = 10.0

[sensors.air]
# Pimoroni BME688 air breakout on I2C. Off by default for hardware-free runs.
enabled = false
i2c_address = 0x76
# Also read the gas/VOC channel (experimental nappy-VOC "best guess"). The gas
# heater takes a few seconds to stabilise before readings appear.
gas = false

[sensors.motion]
# HC-SR501 PIR motion on GPIO4. Off by default and treated as context only.
enabled = false
gpio_pin = 4

[sensors.radar]
# Seeed MR60BHA2 60GHz mmWave kit (XIAO ESP32C6) on WiFi, read over the ESPHome
# native API. Off by default. Only non-medical fields are used (presence, room
# brightness, distance, target count). Respiratory/heart rate are never read —
# the radar's vital signs stay bench-only, with no medical or vital-sign claims.
enabled = false
host = ""
port = 6053
password = ""
include_distance = true
include_target_count = true
# Bench/research ONLY. When true, the radar's respiratory + heart-rate values are
# captured and surfaced as raw, clearly-labelled bench data (e.g. `beddington
# radar-vitals`). They are never fed into the spoken recap, never paired with any
# reassurance, never drive detection/alerts, and are never a medical or safety
# signal. Product/clinical use of these vitals needs the Tier-3 gate + sign-off.
bench_vitals = false

[llm]
enabled = false
base_url = ""
model = ""

[narrator]
# Optional local narrator. Runs only after the deterministic report exists.
# It receives derived text only and never controls detection, timing, or alerts.
enabled = false
backend = "ollama"
model = "llama3.2:1b"
host = "http://127.0.0.1:11434"
num_predict = 140
temperature = 0.3
voice_enabled = false
voice_engine = "piper"
piper_binary = "~/piper/piper"
piper_model = "~/piper-voices/en_GB-jenny_dioco-medium.onnx"
# Multi-speaker voices (e.g. en_GB-vctk) pick a speaker by id; empty = default.
# piper_speaker = ""
# Beddington persona: a local LLM re-voices each (benign) answer in character (a
# gentle bear in the spirit of Paddington), grounded + validated so it can never
# change a fact (see persona.py). Vitals are never restyled. Falls back to the
# plain answer if Ollama is unavailable.
persona_enabled = true
# persona_temperature = 0.4
# persona_num_predict = 80
# persona_timeout = 8.0
